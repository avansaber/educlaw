product: educlaw-k12
tables:

  # ============================================================
  # Domain: discipline
  # ============================================================

  educlaw_k12_discipline_incident:
    owner: discipline
    columns:
      id: TEXT PRIMARY KEY
      naming_series: "TEXT NOT NULL UNIQUE DEFAULT ''"
      incident_date: "TEXT NOT NULL DEFAULT ''"
      incident_time: "TEXT NOT NULL DEFAULT ''"
      location: "TEXT NOT NULL CHECK(location IN ('classroom','hallway','cafeteria','gym','bathroom','playground','bus','off_campus','online','other'))"
      location_detail: "TEXT NOT NULL DEFAULT ''"
      incident_type: "TEXT NOT NULL CHECK(incident_type IN ('tardy','dress_code','electronic_device','disruptive_behavior','disrespectful_language','classroom_disruption','bullying','harassment','physical_altercation_minor','theft','vandalism','cheating','truancy','insubordination','fighting','assault','weapons','drugs_alcohol','sexual_harassment','threats','extortion','arson','gang_activity','sexual_assault','serious_assault','bomb_threat','active_threat','other_minor','other_major'))"
      severity: "TEXT NOT NULL CHECK(severity IN ('minor','moderate','major','emergency'))"
      description: "TEXT NOT NULL DEFAULT ''"
      is_reported_to_law_enforcement: "INTEGER NOT NULL DEFAULT 0"
      is_mandatory_report: "INTEGER NOT NULL DEFAULT 0"
      mandatory_report_date: "TEXT NOT NULL DEFAULT ''"
      mandatory_report_agency: "TEXT NOT NULL DEFAULT ''"
      is_title_ix: "INTEGER NOT NULL DEFAULT 0"
      incident_status: "TEXT NOT NULL DEFAULT 'open' CHECK(incident_status IN ('open','under_review','closed','appealed'))"
      reviewed_by: "TEXT NOT NULL DEFAULT ''"
      reviewed_at: "TEXT NOT NULL DEFAULT ''"
      academic_year_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_academic_year(id) ON DELETE RESTRICT"
      academic_term_id: "TEXT REFERENCES educlaw_academic_term(id) ON DELETE RESTRICT"
      company_id: "TEXT NOT NULL DEFAULT '' REFERENCES company(id) ON DELETE RESTRICT"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      updated_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_disc_incident_company_date
        columns: [company_id, incident_date]
      - name: idx_k12_disc_incident_year_severity
        columns: [academic_year_id, severity]
      - name: idx_k12_disc_incident_status
        columns: [incident_status]
      - name: idx_k12_disc_incident_title_ix
        columns: [is_title_ix]
      - name: idx_k12_disc_incident_naming_series
        columns: [naming_series]
      - name: idx_k12_disc_incident_term
        columns: [academic_term_id]

  educlaw_k12_discipline_student:
    owner: discipline
    columns:
      id: TEXT PRIMARY KEY
      incident_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_k12_discipline_incident(id) ON DELETE RESTRICT"
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      role: "TEXT NOT NULL CHECK(role IN ('offender','victim','witness','bystander'))"
      is_idea_eligible: "INTEGER NOT NULL DEFAULT 0"
      cumulative_suspension_days_ytd: "TEXT NOT NULL DEFAULT '0'"
      mdr_required: "INTEGER NOT NULL DEFAULT 0"
      notes: "TEXT NOT NULL DEFAULT ''"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_disc_student_incident
        columns: [incident_id]
      - name: idx_k12_disc_student_student
        columns: [student_id]
      - name: idx_k12_disc_student_idea
        columns: [student_id, is_idea_eligible]
      - name: idx_k12_disc_student_incident_role
        columns: [incident_id, role]

  educlaw_k12_discipline_action:
    owner: discipline
    columns:
      id: TEXT PRIMARY KEY
      discipline_student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_k12_discipline_student(id) ON DELETE RESTRICT"
      action_type: "TEXT NOT NULL CHECK(action_type IN ('verbal_warning','parent_contact','detention','in_school_suspension','out_of_school_suspension','expulsion_referral','counseling_referral','law_enforcement_referral','restorative_practice','community_service','loss_of_privilege','other'))"
      start_date: "TEXT NOT NULL DEFAULT ''"
      end_date: "TEXT NOT NULL DEFAULT ''"
      duration_days: "TEXT NOT NULL DEFAULT '0'"
      administered_by: "TEXT NOT NULL DEFAULT ''"
      notes: "TEXT NOT NULL DEFAULT ''"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      updated_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_disc_action_student
        columns: [discipline_student_id]
      - name: idx_k12_disc_action_type_date
        columns: [action_type, start_date]

  # ============================================================
  # Domain: health_records
  # ============================================================

  educlaw_k12_health_profile:
    owner: health_records
    columns:
      id: TEXT PRIMARY KEY
      student_id: "TEXT NOT NULL UNIQUE DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      allergies: "TEXT NOT NULL DEFAULT '[]'"
      chronic_conditions: "TEXT NOT NULL DEFAULT '[]'"
      physician_name: "TEXT NOT NULL DEFAULT ''"
      physician_phone: "TEXT NOT NULL DEFAULT ''"
      physician_address: "TEXT NOT NULL DEFAULT ''"
      health_insurance_carrier: "TEXT NOT NULL DEFAULT ''"
      health_insurance_id: "TEXT NOT NULL DEFAULT ''"
      blood_type: "TEXT NOT NULL DEFAULT 'unknown' CHECK(blood_type IN ('A+','A-','B+','B-','AB+','AB-','O+','O-','unknown'))"
      height_cm: "TEXT NOT NULL DEFAULT ''"
      weight_kg: "TEXT NOT NULL DEFAULT ''"
      vision_screening_date: "TEXT NOT NULL DEFAULT ''"
      hearing_screening_date: "TEXT NOT NULL DEFAULT ''"
      dental_screening_date: "TEXT NOT NULL DEFAULT ''"
      activity_restriction: "TEXT NOT NULL DEFAULT 'none' CHECK(activity_restriction IN ('none','limited','no_pe','no_contact_sports','custom'))"
      activity_restriction_notes: "TEXT NOT NULL DEFAULT ''"
      is_provisional_immunization: "INTEGER NOT NULL DEFAULT 0"
      provisional_enrollment_end_date: "TEXT NOT NULL DEFAULT ''"
      is_mckinney_vento: "INTEGER NOT NULL DEFAULT 0"
      emergency_instructions: "TEXT NOT NULL DEFAULT ''"
      profile_status: "TEXT NOT NULL DEFAULT 'incomplete' CHECK(profile_status IN ('active','incomplete','archived'))"
      last_verified_date: "TEXT NOT NULL DEFAULT ''"
      last_verified_by: "TEXT NOT NULL DEFAULT ''"
      company_id: "TEXT NOT NULL DEFAULT '' REFERENCES company(id) ON DELETE RESTRICT"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      updated_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_health_profile_student
        columns: [student_id]
      - name: idx_k12_health_profile_company_status
        columns: [company_id, profile_status]
      - name: idx_k12_health_profile_provisional
        columns: [is_provisional_immunization, provisional_enrollment_end_date]
      - name: idx_k12_health_profile_mckinney
        columns: [is_mckinney_vento]

  educlaw_k12_health_visit:
    owner: health_records
    columns:
      id: TEXT PRIMARY KEY
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      visit_date: "TEXT NOT NULL DEFAULT ''"
      visit_time: "TEXT NOT NULL DEFAULT ''"
      chief_complaint: "TEXT NOT NULL CHECK(chief_complaint IN ('headache','stomachache','injury','fever','respiratory','mental_health','medication','vision','hearing','dental','skin','fatigue','other'))"
      complaint_detail: "TEXT NOT NULL DEFAULT ''"
      temperature: "TEXT NOT NULL DEFAULT ''"
      pulse: "TEXT NOT NULL DEFAULT ''"
      assessment: "TEXT NOT NULL DEFAULT ''"
      treatment_provided: "TEXT NOT NULL DEFAULT ''"
      disposition: "TEXT NOT NULL CHECK(disposition IN ('returned_to_class','sent_home','911_called','referred_to_physician','observation','no_action'))"
      parent_contacted: "INTEGER NOT NULL DEFAULT 0"
      parent_contact_time: "TEXT NOT NULL DEFAULT ''"
      parent_response: "TEXT NOT NULL DEFAULT ''"
      is_emergency: "INTEGER NOT NULL DEFAULT 0"
      academic_term_id: "TEXT REFERENCES educlaw_academic_term(id) ON DELETE RESTRICT"
      company_id: "TEXT NOT NULL DEFAULT '' REFERENCES company(id) ON DELETE RESTRICT"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_health_visit_student_date
        columns: [student_id, visit_date]
      - name: idx_k12_health_visit_company_date
        columns: [company_id, visit_date]
      - name: idx_k12_health_visit_disposition
        columns: [disposition]
      - name: idx_k12_health_visit_emergency
        columns: [is_emergency]
      - name: idx_k12_health_visit_term
        columns: [academic_term_id]

  educlaw_k12_student_medication:
    owner: health_records
    columns:
      id: TEXT PRIMARY KEY
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      medication_name: "TEXT NOT NULL DEFAULT ''"
      dosage: "TEXT NOT NULL DEFAULT ''"
      route: "TEXT NOT NULL CHECK(route IN ('oral','topical','inhalation','injection','nasal','eye_drops','ear_drops','other'))"
      frequency: "TEXT NOT NULL CHECK(frequency IN ('once_daily','twice_daily','three_times_daily','as_needed','as_scheduled'))"
      administration_times: "TEXT NOT NULL DEFAULT '[]'"
      prescribing_physician: "TEXT NOT NULL DEFAULT ''"
      physician_authorization_date: "TEXT NOT NULL DEFAULT ''"
      start_date: "TEXT NOT NULL DEFAULT ''"
      end_date: "TEXT NOT NULL DEFAULT ''"
      supply_count: "INTEGER NOT NULL DEFAULT 0"
      supply_low_threshold: "INTEGER NOT NULL DEFAULT 5"
      storage_instructions: "TEXT NOT NULL DEFAULT ''"
      administration_instructions: "TEXT NOT NULL DEFAULT ''"
      is_controlled_substance: "INTEGER NOT NULL DEFAULT 0"
      medication_status: "TEXT NOT NULL DEFAULT 'active' CHECK(medication_status IN ('active','expired','discontinued'))"
      company_id: "TEXT NOT NULL DEFAULT '' REFERENCES company(id) ON DELETE RESTRICT"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      updated_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_student_med_student_status
        columns: [student_id, medication_status]
      - name: idx_k12_student_med_company_status
        columns: [company_id, medication_status]

  educlaw_k12_medication_log:
    owner: health_records
    columns:
      id: TEXT PRIMARY KEY
      student_medication_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_k12_student_medication(id) ON DELETE RESTRICT"
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      log_date: "TEXT NOT NULL DEFAULT ''"
      log_time: "TEXT NOT NULL DEFAULT ''"
      dose_given: "TEXT NOT NULL DEFAULT ''"
      administered_by: "TEXT NOT NULL DEFAULT ''"
      student_response: "TEXT NOT NULL DEFAULT ''"
      is_refused: "INTEGER NOT NULL DEFAULT 0"
      refusal_reason: "TEXT NOT NULL DEFAULT ''"
      notes: "TEXT NOT NULL DEFAULT ''"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_med_log_med_date
        columns: [student_medication_id, log_date]
      - name: idx_k12_med_log_student_date
        columns: [student_id, log_date]

  educlaw_k12_immunization:
    owner: health_records
    columns:
      id: TEXT PRIMARY KEY
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      vaccine_name: "TEXT NOT NULL DEFAULT ''"
      cvx_code: "TEXT NOT NULL DEFAULT ''"
      dose_number: "INTEGER NOT NULL DEFAULT 1"
      administration_date: "TEXT NOT NULL DEFAULT ''"
      lot_number: "TEXT NOT NULL DEFAULT ''"
      manufacturer: "TEXT NOT NULL DEFAULT ''"
      provider_name: "TEXT NOT NULL DEFAULT ''"
      provider_type: "TEXT NOT NULL DEFAULT ''"
      source: "TEXT NOT NULL DEFAULT 'manual' CHECK(source IN ('manual','iis_sync','provider_import'))"
      iis_record_id: "TEXT NOT NULL DEFAULT ''"
      corrects_record_id: "TEXT NOT NULL DEFAULT ''"
      company_id: "TEXT NOT NULL DEFAULT '' REFERENCES company(id) ON DELETE RESTRICT"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_immunization_student_cvx_dose
        columns: [student_id, cvx_code, dose_number]
      - name: idx_k12_immunization_company_date
        columns: [company_id, administration_date]
      - name: idx_k12_immunization_cvx
        columns: [cvx_code]

  educlaw_k12_immunization_waiver:
    owner: health_records
    columns:
      id: TEXT PRIMARY KEY
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      vaccine_name: "TEXT NOT NULL DEFAULT ''"
      cvx_code: "TEXT NOT NULL DEFAULT ''"
      waiver_type: "TEXT NOT NULL CHECK(waiver_type IN ('medical','religious','philosophical'))"
      waiver_basis: "TEXT NOT NULL DEFAULT ''"
      issuing_physician: "TEXT NOT NULL DEFAULT ''"
      issue_date: "TEXT NOT NULL DEFAULT ''"
      expiry_date: "TEXT NOT NULL DEFAULT ''"
      waiver_status: "TEXT NOT NULL DEFAULT 'active' CHECK(waiver_status IN ('active','expired','revoked'))"
      company_id: "TEXT NOT NULL DEFAULT '' REFERENCES company(id) ON DELETE RESTRICT"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      updated_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_imm_waiver_student_status
        columns: [student_id, waiver_status]
      - name: idx_k12_imm_waiver_company_type_status
        columns: [company_id, waiver_type, waiver_status]
      - name: idx_k12_imm_waiver_expiry_status
        columns: [expiry_date, waiver_status]

  # ============================================================
  # Domain: special_education
  # ============================================================

  educlaw_k12_sped_referral:
    owner: special_education
    columns:
      id: TEXT PRIMARY KEY
      naming_series: "TEXT NOT NULL UNIQUE DEFAULT ''"
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      referral_date: "TEXT NOT NULL DEFAULT ''"
      referral_source: "TEXT NOT NULL CHECK(referral_source IN ('teacher','parent','counselor','physician','self','administrator','other'))"
      referral_reason: "TEXT NOT NULL DEFAULT ''"
      areas_of_concern: "TEXT NOT NULL DEFAULT '[]'"
      prior_interventions: "TEXT NOT NULL DEFAULT ''"
      referral_status: "TEXT NOT NULL DEFAULT 'received' CHECK(referral_status IN ('received','consent_pending','consent_received','consent_denied','evaluation_in_progress','evaluation_complete','closed'))"
      consent_request_date: "TEXT NOT NULL DEFAULT ''"
      consent_received_date: "TEXT NOT NULL DEFAULT ''"
      consent_denied_date: "TEXT NOT NULL DEFAULT ''"
      evaluation_deadline: "TEXT NOT NULL DEFAULT ''"
      company_id: "TEXT NOT NULL DEFAULT '' REFERENCES company(id) ON DELETE RESTRICT"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      updated_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_sped_referral_student
        columns: [student_id]
      - name: idx_k12_sped_referral_company_status
        columns: [company_id, referral_status]
      - name: idx_k12_sped_referral_deadline_status
        columns: [evaluation_deadline, referral_status]
      - name: idx_k12_sped_referral_naming_series
        columns: [naming_series]

  educlaw_k12_sped_evaluation:
    owner: special_education
    columns:
      id: TEXT PRIMARY KEY
      referral_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_k12_sped_referral(id) ON DELETE RESTRICT"
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      evaluation_type: "TEXT NOT NULL CHECK(evaluation_type IN ('psychological','academic_achievement','speech_language','occupational_therapy','physical_therapy','hearing_screening','vision_screening','social_behavioral','classroom_observation','adaptive_behavior','other'))"
      evaluator_name: "TEXT NOT NULL DEFAULT ''"
      evaluator_role: "TEXT NOT NULL DEFAULT ''"
      evaluation_date: "TEXT NOT NULL DEFAULT ''"
      instrument_used: "TEXT NOT NULL DEFAULT ''"
      findings_summary: "TEXT NOT NULL DEFAULT ''"
      scores: "TEXT NOT NULL DEFAULT '{}'"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_sped_eval_referral
        columns: [referral_id]
      - name: idx_k12_sped_eval_student_type
        columns: [student_id, evaluation_type]

  educlaw_k12_sped_eligibility:
    owner: special_education
    columns:
      id: TEXT PRIMARY KEY
      referral_id: "TEXT NOT NULL UNIQUE DEFAULT '' REFERENCES educlaw_k12_sped_referral(id) ON DELETE RESTRICT"
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      eligibility_meeting_date: "TEXT NOT NULL DEFAULT ''"
      iep_deadline: "TEXT NOT NULL DEFAULT ''"
      is_eligible: "INTEGER NOT NULL DEFAULT 0"
      disability_categories: "TEXT NOT NULL DEFAULT '[]'"
      primary_disability: "TEXT NOT NULL DEFAULT '' CHECK(primary_disability IN ('specific_learning_disability','speech_language_impairment','other_health_impairment','autism_spectrum_disorder','intellectual_disability','emotional_disturbance','developmental_delay','multiple_disabilities','hearing_impairment','orthopedic_impairment','visual_impairment','traumatic_brain_injury','deaf_blindness','not_applicable'))"
      adverse_educational_effect: "TEXT NOT NULL DEFAULT ''"
      eligibility_status: "TEXT NOT NULL DEFAULT 'eligible' CHECK(eligibility_status IN ('eligible','ineligible','deferred'))"
      ineligibility_reason: "TEXT NOT NULL DEFAULT ''"
      team_members_present: "TEXT NOT NULL DEFAULT '[]'"
      parent_consent_date: "TEXT NOT NULL DEFAULT ''"
      company_id: "TEXT NOT NULL DEFAULT '' REFERENCES company(id) ON DELETE RESTRICT"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_sped_elig_student_eligible
        columns: [student_id, is_eligible]
      - name: idx_k12_sped_elig_iep_deadline
        columns: [iep_deadline, is_eligible]
      - name: idx_k12_sped_elig_company_status
        columns: [company_id, eligibility_status]

  educlaw_k12_iep:
    owner: special_education
    columns:
      id: TEXT PRIMARY KEY
      naming_series: "TEXT NOT NULL UNIQUE DEFAULT ''"
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      eligibility_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_k12_sped_eligibility(id) ON DELETE RESTRICT"
      iep_version: "INTEGER NOT NULL DEFAULT 1"
      is_amendment: "INTEGER NOT NULL DEFAULT 0"
      parent_iep_id: "TEXT REFERENCES educlaw_k12_iep(id) ON DELETE RESTRICT"
      iep_meeting_date: "TEXT NOT NULL DEFAULT ''"
      iep_start_date: "TEXT NOT NULL DEFAULT ''"
      iep_end_date: "TEXT NOT NULL DEFAULT ''"
      annual_review_due_date: "TEXT NOT NULL DEFAULT ''"
      triennial_reevaluation_due_date: "TEXT NOT NULL DEFAULT ''"
      plaafp_academic: "TEXT NOT NULL DEFAULT ''"
      plaafp_functional: "TEXT NOT NULL DEFAULT ''"
      lre_percentage_general_ed: "TEXT NOT NULL DEFAULT ''"
      lre_justification: "TEXT NOT NULL DEFAULT ''"
      supplementary_aids: "TEXT NOT NULL DEFAULT ''"
      program_modifications: "TEXT NOT NULL DEFAULT ''"
      state_assessment_participation: "TEXT NOT NULL DEFAULT 'with_accommodations' CHECK(state_assessment_participation IN ('standard','with_accommodations','alternate_assessment','exempt'))"
      state_assessment_accommodations: "TEXT NOT NULL DEFAULT ''"
      transition_plan_required: "INTEGER NOT NULL DEFAULT 0"
      transition_postsecondary_goal: "TEXT NOT NULL DEFAULT ''"
      transition_employment_goal: "TEXT NOT NULL DEFAULT ''"
      transition_independent_living_goal: "TEXT NOT NULL DEFAULT ''"
      progress_report_frequency: "TEXT NOT NULL DEFAULT 'quarterly' CHECK(progress_report_frequency IN ('quarterly','semester','monthly','other'))"
      iep_status: "TEXT NOT NULL DEFAULT 'draft' CHECK(iep_status IN ('draft','active','amended','expired','superseded'))"
      parent_consent_date: "TEXT NOT NULL DEFAULT ''"
      company_id: "TEXT NOT NULL DEFAULT '' REFERENCES company(id) ON DELETE RESTRICT"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      updated_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_iep_student_status
        columns: [student_id, iep_status]
      - name: idx_k12_iep_annual_review_status
        columns: [annual_review_due_date, iep_status]
      - name: idx_k12_iep_triennial_reeval
        columns: [triennial_reevaluation_due_date]
      - name: idx_k12_iep_company_status
        columns: [company_id, iep_status]
      - name: idx_k12_iep_naming_series
        columns: [naming_series]
      - name: idx_k12_iep_parent
        columns: [parent_iep_id]
      - name: idx_k12_iep_eligibility
        columns: [eligibility_id]

  educlaw_k12_iep_goal:
    owner: special_education
    columns:
      id: TEXT PRIMARY KEY
      iep_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_k12_iep(id) ON DELETE RESTRICT"
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      goal_area: "TEXT NOT NULL CHECK(goal_area IN ('reading','writing','math','communication','social_emotional','behavioral','motor','vocational','adaptive','other'))"
      goal_description: "TEXT NOT NULL DEFAULT ''"
      baseline_performance: "TEXT NOT NULL DEFAULT ''"
      target_performance: "TEXT NOT NULL DEFAULT ''"
      measurement_method: "TEXT NOT NULL CHECK(measurement_method IN ('test_score','work_sample','observation','rubric','checklist','probe','other'))"
      monitoring_frequency: "TEXT NOT NULL CHECK(monitoring_frequency IN ('weekly','biweekly','monthly','quarterly','per_marking_period'))"
      responsible_provider: "TEXT NOT NULL DEFAULT ''"
      sort_order: "INTEGER NOT NULL DEFAULT 0"
      is_met: "INTEGER NOT NULL DEFAULT 0"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_iep_goal_iep
        columns: [iep_id]
      - name: idx_k12_iep_goal_student_met
        columns: [student_id, is_met]
      - name: idx_k12_iep_goal_provider
        columns: [responsible_provider]

  educlaw_k12_iep_service:
    owner: special_education
    columns:
      id: TEXT PRIMARY KEY
      iep_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_k12_iep(id) ON DELETE RESTRICT"
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      service_type: "TEXT NOT NULL CHECK(service_type IN ('special_education_instruction','speech_therapy','occupational_therapy','physical_therapy','counseling','transportation','assistive_technology','health_services','orientation_mobility','other'))"
      service_setting: "TEXT NOT NULL CHECK(service_setting IN ('general_ed_classroom','resource_room','self_contained','separate_school','home','hospital','other'))"
      frequency_minutes_per_week: "INTEGER NOT NULL DEFAULT 0"
      provider_name: "TEXT NOT NULL DEFAULT ''"
      provider_role: "TEXT NOT NULL DEFAULT ''"
      start_date: "TEXT NOT NULL DEFAULT ''"
      end_date: "TEXT NOT NULL DEFAULT ''"
      total_minutes_delivered: "INTEGER NOT NULL DEFAULT 0"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_iep_service_iep
        columns: [iep_id]
      - name: idx_k12_iep_service_student_type
        columns: [student_id, service_type]

  educlaw_k12_iep_service_log:
    owner: special_education
    columns:
      id: TEXT PRIMARY KEY
      iep_service_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_k12_iep_service(id) ON DELETE RESTRICT"
      student_id: "TEXT NOT NULL DEFAULT '' REFERENCES educlaw_student(id) ON DELETE RESTRICT"
      session_date: "TEXT NOT NULL DEFAULT ''"
      minutes_delivered: "INTEGER NOT NULL DEFAULT 0"
      session_notes: "TEXT NOT NULL DEFAULT ''"
      provider_name: "TEXT NOT NULL DEFAULT ''"
      is_makeup_session: "INTEGER NOT NULL DEFAULT 0"
      was_session_missed: "INTEGER NOT NULL DEFAULT 0"
      missed_reason: "TEXT NOT NULL DEFAULT ''"
      created_at: "TEXT NOT NULL DEFAULT (datetime('now'))"
      created_by: "TEXT NOT NULL DEFAULT ''"
    indexes:
      - name: idx_k12_iep_svc_log_service_date
        columns: [iep_service_id, session_date]
      - name: idx_k12_iep_svc_log_student_date
        columns: [student_id, session_date]

  educlaw_k12_iep_team_member:
    owner: special_education
    columns:
      id: TEXT PRIMARY KEY
