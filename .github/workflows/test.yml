name: Tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pytest
        run: pip install pytest
      - name: Setup erpclaw_lib
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/avansaber/erpclaw.git /tmp/erpclaw-core
          cd /tmp/erpclaw-core
          git sparse-checkout set scripts/erpclaw-setup/lib
          mkdir -p ~/.openclaw/erpclaw/lib
          cp -r scripts/erpclaw-setup/lib/erpclaw_lib ~/.openclaw/erpclaw/lib/
      - name: Run unit tests
        run: pytest . -q --tb=short --ignore=__pycache__
